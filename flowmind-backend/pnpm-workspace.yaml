# pnpm-workspace.yaml
# Single-package project — "packages" must be present for pnpm v11 workspace compatibility.
# The dot entry tells pnpm this directory itself is the only package.
packages:
  - '.'

# pnpm v11: allow native modules to run install-time build scripts
allowBuilds:
  '@google/genai': true
  '@prisma/engines': true
  bcrypt: true
  esbuild: true
  msgpackr-extract: true
  prisma: true
  protobufjs: true
